<div class="bg-[#f1f5f9] min-h-[calc(100vh-64px)]"> <!-- Ajuste de altura para no chocar con el nav global -->
    
    <!-- Professional Header (Specific to Sainnavv) -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm no-print">
      <div class="max-w-screen-2xl mx-auto px-6 h-20 flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-900 tracking-tight">Formulario SAINNAVV</h1>
        <button (click)="print()" class="px-5 py-2.5 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl hover:text-indigo-600 flex items-center shadow-sm">
           Imprimir Reporte
        </button>
      </div>
    </header>

    <div class="max-w-screen-2xl mx-auto px-6 py-10 flex flex-col lg:flex-row gap-10">
      <!-- Sidebar de Pasos -->
      <aside class="lg:w-80 flex-shrink-0 no-print">
        <div class="sticky top-28">
           <nav class="space-y-2 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
             <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] px-3 mb-4">Progreso del Formulario</p>
             
             <button *ngFor="let step of steps; let idx = index"
                     (click)="setStep(idx)"
                     [class]="activeStep === idx ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-600 hover:bg-slate-50'"
                     class="w-full text-left px-4 py-3.5 rounded-xl text-sm font-bold transition-all flex items-center group relative">
                  <div [class]="activeStep === idx ? 'bg-white/20' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200'" class="mr-4 w-9 h-9 rounded-lg flex items-center justify-center transition-colors">
                     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path [attr.d]="step.iconPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                  </div>
                  <div class="flex-1">
                     <span [class]="activeStep === idx ? 'text-indigo-100' : 'text-slate-400'" class="block text-[10px] uppercase tracking-wider mb-0.5">Paso {{idx + 1}}</span>
                     {{step.name}}
                  </div>
                  <div *ngIf="activeStep > idx && activeStep !== idx" class="absolute right-4 text-emerald-500">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                  </div>
             </button>
           </nav>
        </div>
      </aside>

      <!-- Área Principal del Formulario -->
      <main class="flex-1">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden relative">
          <div class="p-8 sm:p-12">
             <!-- AQUÍ INVOCAMOS AL FORMULARIO Y PASAMOS LOS DATOS DE LOS PASOS -->
             <app-medical-form 
               [activeStep]="activeStep" 
               (stepChange)="setStep($event)">
             </app-medical-form>
          </div>
        </div>
      </main>
    </div>
</div>
