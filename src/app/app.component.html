

<div class="min-h-screen bg-[#f1f5f9] flex flex-col font-sans">
  
  <!-- BARRA DE NAVEGACIÓN SUPERIOR (Global) -->
   <nav *ngIf="showNavbar()" class="bg-slate-900 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-screen-2xl mx-auto px-4 h-16 flex items-center justify-between">
      
      <!-- Logo / Título del Sistema -->
      <div class="flex items-center gap-3">
        <div class="bg-indigo-600 p-2 rounded-lg">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
        </div>
        <div>
          <h1 class="font-bold text-lg tracking-tight leading-none">SISTEMA AHS</h1>
          <span class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Portal Integrado</span>
        </div>
      </div>

      <!-- BOTONES DEL MENÚ -->
      <div class="flex gap-4">
        <!-- Botón Médico -->
        <a *ngIf="tieneAcceso('1197') || tieneAcceso('1198') || tieneAcceso('79') || tieneAcceso('1364')" 
   routerLink="/medical-form"
           routerLinkActive="bg-indigo-600 text-white shadow-indigo-500/50 border-indigo-500"
           class="flex items-center px-4 py-2 rounded-lg text-sm font-bold text-slate-300 hover:text-white hover:bg-slate-800 border border-transparent transition-all">
           <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
           SAINNAVV (Médico)
        </a>

        <!-- Botón Social -->
        <a *ngIf="tieneAcceso('10') || tieneAcceso('1364')" routerLink="/social-service" 
           routerLinkActive="bg-emerald-600 text-white shadow-emerald-500/50 border-emerald-500"
           class="flex items-center px-4 py-2 rounded-lg text-sm font-bold text-slate-300 hover:text-white hover:bg-slate-800 border border-transparent transition-all">
           <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
           SERVICIO SOCIAL
        </a>
      </div>

    </div>
  </nav>

  <!-- AQUÍ SE CARGAN TUS COMPONENTES (PÁGINAS) AUTOMÁTICAMENTE -->
  <main class="flex-1 relative">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer global opcional -->
  <footer class="py-4 text-center text-xs text-slate-400 border-t bg-white">
    <p>Hospital Pediatrico Avelino Castelan &copy; 2026 - Área de Sistemas</p>
  </footer>

</div>
